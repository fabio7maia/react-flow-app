name: Publish Release

# Triggered when a PR from a release/* branch is MERGED into main/master.
# Publishes the official version to npm (dist-tag → latest), creates a GitHub
# release, and then locks the release branch to prevent further changes.
on:
    pull_request:
        branches:
            - main
            - master
        types: [closed]

jobs:
    publish:
        name: Publish official release to npm
        # Only run when a release/* PR is actually merged (not just closed)
        if: >
            github.event.pull_request.merged == true &&
            startsWith(github.head_ref, 'release/')
        runs-on: ubuntu-latest

        permissions:
            contents: write # create tags, releases, and commits
            pull-requests: write # post final comment on the PR
            id-token: write # npm provenance attestation
            # NOTE: 'administration: write' is required to lock the branch.
            # If your organisation's Actions settings restrict this permission,
            # replace GITHUB_TOKEN with a PAT (secret: GH_ADMIN_PAT) that has
            # the 'repo' and 'admin:repo_hook' scopes.
            administration: write

        steps:
            # ── 1. Extract & validate version ──────────────────────────────────────
            - name: Extract version from branch name
              id: version
              run: |
                  BRANCH="${{ github.head_ref }}"
                  VERSION="${BRANCH#release/}"

                  # Validate semver (MAJOR.MINOR.PATCH — no pre-release suffix)
                  if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "❌ Branch '$BRANCH' does not carry a valid semver version: '$VERSION'"
                    exit 1
                  fi

                  echo "version=${VERSION}"           >> $GITHUB_OUTPUT
                  echo "tag=v${VERSION}"               >> $GITHUB_OUTPUT
                  echo "release_branch=${BRANCH}"      >> $GITHUB_OUTPUT

                  echo "📦 Will publish: ${VERSION}"

            # ── 2. Setup ────────────────────────────────────────────────────────────
            - name: Checkout (merge commit on main)
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.base_ref }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  registry-url: "https://registry.npmjs.org"

            # ── 3. Quality gates ────────────────────────────────────────────────────
            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint (Biome)
              run: npm run lint

            - name: Test with coverage
              run: npm run test:coverage

            - name: Build
              run: npm run build

            # ── 4. Version & publish ────────────────────────────────────────────────
            - name: Stamp version in package.json
              run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

            - name: Publish to npm (dist-tag → latest)
              run: npm publish --tag latest
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            # ── 5. Tag & GitHub release ─────────────────────────────────────────────
            - name: Create annotated Git tag
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag ${{ steps.version.outputs.tag }} \
                    -m "Release ${{ steps.version.outputs.version }}"
                  git push origin ${{ steps.version.outputs.tag }}

            - name: Generate release notes
              id: notes
              uses: actions/github-script@v7
              with:
                  result-encoding: string
                  script: |
                      const { data } = await github.rest.repos.generateReleaseNotes({
                        owner:            context.repo.owner,
                        repo:             context.repo.repo,
                        tag_name:         '${{ steps.version.outputs.tag }}',
                        target_commitish: '${{ github.base_ref }}',
                        previous_tag_name: undefined,
                      });
                      return data.body;

            - name: Write release notes to file
              run: |
                  printf '%s' "$NOTES" > RELEASE_NOTES.md
              env:
                  NOTES: ${{ steps.notes.outputs.result }}

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ steps.version.outputs.tag }}" \
                    --title "v${{ steps.version.outputs.version }}" \
                    --notes-file RELEASE_NOTES.md \
                    --target "${{ github.base_ref }}"

            # ── 6. Lock the release branch ──────────────────────────────────────────
            # Prevents any further pushes (direct or via PRs) to the release branch.
            # This ensures the published artefact is immutable and auditable.
            - name: Lock release branch
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  RELEASE_BRANCH="${{ steps.version.outputs.release_branch }}"
                  REPO="${{ github.repository }}"

                  echo "🔒 Locking branch: ${RELEASE_BRANCH}"

                  # lock_branch = true prevents all pushes to the branch.
                  # enforce_admins = true applies the protection even to admins.
                  # restrictions = null means no user/app whitelist is set (combined
                  # with lock_branch this blocks everyone).
                  curl -X PUT \
                    -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "https://api.github.com/repos/${REPO}/branches/${RELEASE_BRANCH}/protection" \
                    -d '{
                      "required_status_checks": null,
                      "enforce_admins": true,
                      "required_pull_request_reviews": null,
                      "restrictions": null,
                      "lock_branch": true,
                      "allow_force_pushes": false,
                      "allow_deletions": false
                    }'

                  echo "✅ Branch '${RELEASE_BRANCH}' is now locked."

            # ── 7. Final PR comment ─────────────────────────────────────────────────
            - name: Comment on PR with release info
              uses: actions/github-script@v7
              with:
                  script: |
                      const version       = '${{ steps.version.outputs.version }}';
                      const tag           = '${{ steps.version.outputs.tag }}';
                      const releaseBranch = '${{ steps.version.outputs.release_branch }}';

                      const body = [
                        '## ✅ Official Release Published',
                        '',
                        `| | |`,
                        `|---|---|`,
                        `| **npm version** | \`${version}\` |`,
                        `| **Git tag** | \`${tag}\` |`,
                        `| **npm dist-tag** | \`latest\` |`,
                        `| **Branch** | \`${releaseBranch}\` 🔒 locked |`,
                        '',
                        '**Install:**',
                        '```sh',
                        'npm install react-flow-app',
                        '```',
                        '',
                        `> 🔒 The branch \`${releaseBranch}\` has been locked and no further changes can be pushed to it.`,
                      ].join('\n');

                      await github.rest.issues.createComment({
                        owner:        context.repo.owner,
                        repo:         context.repo.repo,
                        issue_number: context.issue.number,
                        body,
                      });
