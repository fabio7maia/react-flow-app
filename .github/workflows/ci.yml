name: CI

on:
    push:
        branches:
            - master
            - main
            - "release/**"
            - "feature/**"
            - "fix/**"
            - "chore/**"
            - "claude/**"
        paths-ignore:
            - "*.md"
            - "docs/**"
    pull_request:
        types: [opened, synchronize, reopened]

# Cancel in-flight runs for the same branch/PR to avoid wasted compute
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Lint · Test · Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint (Biome)
              run: npm run lint

            - name: Test with coverage
              run: npm run test:coverage

            - name: Build
              run: npm run build
