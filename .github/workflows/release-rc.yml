name: Publish RC

# Triggered when a PR from a release/* branch is opened, updated or reopened
# against main/master. Publishes a pre-release version to npm under the "rc"
# dist-tag and creates a GitHub pre-release with the tag v{VERSION}-rc.{N}.
on:
    pull_request:
        branches:
            - main
            - master
        types: [opened, synchronize, reopened]

# Only one RC publish per PR at a time — cancel previous run if a new push arrives
concurrency:
    group: release-rc-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    publish-rc:
        name: Publish RC to npm
        # Only run for PRs coming from a release/* branch
        if: startsWith(github.head_ref, 'release/')
        runs-on: ubuntu-latest

        permissions:
            contents: write # create tags and GitHub releases
            pull-requests: write # post comment on the PR
            id-token: write # npm provenance attestation

        steps:
            # ── 1. Extract & validate version ──────────────────────────────────────
            - name: Extract version from branch name
              id: version
              run: |
                  BRANCH="${{ github.head_ref }}"
                  VERSION="${BRANCH#release/}"

                  # Validate semver (MAJOR.MINOR.PATCH)
                  if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "❌ Branch '$BRANCH' does not carry a valid semver version: '$VERSION'"
                    exit 1
                  fi

                  RC_VERSION="${VERSION}-rc.${{ github.run_number }}"
                  echo "version=${VERSION}"       >> $GITHUB_OUTPUT
                  echo "rc_version=${RC_VERSION}" >> $GITHUB_OUTPUT
                  echo "tag=v${RC_VERSION}"       >> $GITHUB_OUTPUT
                  echo "release_branch=${BRANCH}" >> $GITHUB_OUTPUT

                  echo "📦 Will publish: ${RC_VERSION}"

            # ── 2. Setup ────────────────────────────────────────────────────────────
            - name: Checkout release branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  registry-url: "https://registry.npmjs.org"

            # ── 3. Quality gates ────────────────────────────────────────────────────
            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint (Biome)
              run: npm run lint

            - name: Test with coverage
              run: npm run test:coverage

            - name: Build
              run: npm run build

            # ── 4. Version & publish ────────────────────────────────────────────────
            - name: Stamp RC version in package.json
              run: npm version ${{ steps.version.outputs.rc_version }} --no-git-tag-version

            - name: Publish to npm (dist-tag → rc)
              run: npm publish --tag rc
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            # ── 5. Tag & GitHub pre-release ─────────────────────────────────────────
            - name: Create annotated Git tag
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag ${{ steps.version.outputs.tag }} \
                    -m "Release candidate ${{ steps.version.outputs.rc_version }}"
                  git push origin ${{ steps.version.outputs.tag }}

            - name: Create GitHub pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  RC_VERSION="${{ steps.version.outputs.rc_version }}"
                  TAG="${{ steps.version.outputs.tag }}"
                  VERSION="${{ steps.version.outputs.version }}"

                  NOTES=$(cat <<EOF
                  Pre-release candidate for **v${VERSION}**.

                  ## Install
                  \`\`\`sh
                  # Latest RC:
                  npm install react-flow-app@rc

                  # Exact version:
                  npm install react-flow-app@${RC_VERSION}
                  \`\`\`

                  > ⚠️ This is a pre-release — do **not** use in production.
                  EOF
                  )

                  gh release create "$TAG" \
                    --title "Release Candidate ${RC_VERSION}" \
                    --notes "$NOTES" \
                    --prerelease \
                    --target "${{ github.head_ref }}"

            # ── 6. PR comment ───────────────────────────────────────────────────────
            - name: Comment on PR with RC info
              uses: actions/github-script@v7
              with:
                  script: |
                      const rcVersion = '${{ steps.version.outputs.rc_version }}';
                      const tag       = '${{ steps.version.outputs.tag }}';
                      const runNumber = '${{ github.run_number }}';

                      const body = [
                        '## 🚀 Release Candidate Published',
                        '',
                        `| | |`,
                        `|---|---|`,
                        `| **npm version** | \`${rcVersion}\` |`,
                        `| **Git tag** | \`${tag}\` |`,
                        `| **Run** | #${runNumber} |`,
                        '',
                        '**Install:**',
                        '```sh',
                        '# Latest RC (dist-tag):',
                        'npm install react-flow-app@rc',
                        '',
                        '# Pinned to this exact build:',
                        `npm install react-flow-app@${rcVersion}`,
                        '```',
                        '',
                        '> ⚠️ Pre-release — do not use in production.',
                      ].join('\n');

                      await github.rest.issues.createComment({
                        owner:        context.repo.owner,
                        repo:         context.repo.repo,
                        issue_number: context.issue.number,
                        body,
                      });
