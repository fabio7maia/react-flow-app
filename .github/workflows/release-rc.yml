name: Publish RC

# Triggered when a PR from ANY branch (feature/*, fix/*, chore/*, …) is
# opened, updated or re-opened against a release/* branch.
#
# Flow:
#   feature/my-change  ──PR──►  release/1.2.3
#                                     │
#                          [this workflow fires]
#                                     │
#                          publish 1.2.3-rc.{run_number}
#                          npm dist-tag → rc
#                          GitHub pre-release
#                          PR comment with install instructions

on:
    pull_request:
        branches:
            - "release/**"
        types: [opened, synchronize, reopened]

# Cancel previous RC publish for the same PR when a new commit arrives
concurrency:
    group: release-rc-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    publish-rc:
        name: Publish RC to npm
        runs-on: ubuntu-latest

        permissions:
            contents: write # create tags and GitHub releases
            pull-requests: write # post comment on the PR
            id-token: write # npm provenance attestation

        steps:
            # ── 1. Extract & validate version ──────────────────────────────────────
            # The release version lives in the BASE branch name (release/X.Y.Z)
            - name: Extract version from target release branch
              id: version
              run: |
                  BASE="${{ github.base_ref }}"          # e.g. release/1.2.3
                  VERSION="${BASE#release/}"              # e.g. 1.2.3

                  # Enforce strict semver (MAJOR.MINOR.PATCH)
                  if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "❌ Target branch '$BASE' does not carry a valid semver: '$VERSION'"
                    exit 1
                  fi

                  RC_VERSION="${VERSION}-rc.${{ github.run_number }}"

                  echo "version=${VERSION}"       >> $GITHUB_OUTPUT
                  echo "rc_version=${RC_VERSION}" >> $GITHUB_OUTPUT
                  echo "tag=v${RC_VERSION}"       >> $GITHUB_OUTPUT
                  echo "release_branch=${BASE}"   >> $GITHUB_OUTPUT

                  echo "📦 Will publish RC: ${RC_VERSION}"

            # ── 2. Setup ────────────────────────────────────────────────────────────
            # Check out the release branch (the merge target) — this is the
            # accumulated state that will become the release, not the feature branch.
            - name: Checkout release branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.base_ref }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  registry-url: "https://registry.npmjs.org"

            # ── 3. Quality gates ────────────────────────────────────────────────────
            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint (Biome)
              run: npm run lint

            - name: Test with coverage
              run: npm run test:coverage

            - name: Build
              run: npm run build

            # ── 4. Version & publish ────────────────────────────────────────────────
            - name: Stamp RC version in package.json
              run: npm version ${{ steps.version.outputs.rc_version }} --no-git-tag-version

            - name: Publish to npm (dist-tag → rc)
              run: npm publish --tag rc
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            # ── 5. Tag & GitHub pre-release ─────────────────────────────────────────
            - name: Create annotated Git tag
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag ${{ steps.version.outputs.tag }} \
                    -m "Release candidate ${{ steps.version.outputs.rc_version }}"
                  git push origin ${{ steps.version.outputs.tag }}

            - name: Create GitHub pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  RC_VERSION="${{ steps.version.outputs.rc_version }}"
                  TAG="${{ steps.version.outputs.tag }}"
                  VERSION="${{ steps.version.outputs.version }}"
                  HEAD_BRANCH="${{ github.head_ref }}"

                  NOTES=$(cat <<EOF
                  Pre-release candidate for **v${VERSION}**.

                  Includes changes from PR #${{ github.event.pull_request.number }} (\`${HEAD_BRANCH}\`).

                  ## Install
                  \`\`\`sh
                  # Latest RC (dist-tag):
                  npm install react-flow-app@rc

                  # Pinned to this exact build:
                  npm install react-flow-app@${RC_VERSION}
                  \`\`\`

                  > ⚠️ Pre-release — do **not** use in production.
                  EOF
                  )

                  gh release create "$TAG" \
                    --title "Release Candidate ${RC_VERSION}" \
                    --notes "$NOTES" \
                    --prerelease \
                    --target "${{ github.base_ref }}"

            # ── 6. PR comment ───────────────────────────────────────────────────────
            - name: Comment on PR with RC info
              uses: actions/github-script@v7
              with:
                  script: |
                      const rcVersion     = '${{ steps.version.outputs.rc_version }}';
                      const tag           = '${{ steps.version.outputs.tag }}';
                      const releaseBranch = '${{ steps.version.outputs.release_branch }}';

                      const body = [
                        '## 🚀 Release Candidate Published',
                        '',
                        `| | |`,
                        `|---|---|`,
                        `| **npm version** | \`${rcVersion}\` |`,
                        `| **Git tag** | \`${tag}\` |`,
                        `| **Target release** | \`${releaseBranch}\` |`,
                        '',
                        '**Install:**',
                        '```sh',
                        '# Latest RC (dist-tag):',
                        'npm install react-flow-app@rc',
                        '',
                        '# Pinned to this exact build:',
                        `npm install react-flow-app@${rcVersion}`,
                        '```',
                        '',
                        '> ⚠️ Pre-release — do not use in production.',
                        '> When ready, trigger the **Publish Release** workflow on',
                        `> \`${releaseBranch}\` to cut the official release.`,
                      ].join('\n');

                      await github.rest.issues.createComment({
                        owner:        context.repo.owner,
                        repo:         context.repo.repo,
                        issue_number: context.issue.number,
                        body,
                      });
